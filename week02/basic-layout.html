<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML Structure</title>
    <meta name="description" content="A basic HTML structure example using semantic HTML elements">
    <meta name="author" content="Usanga">
</head>

<body>

    <header>
        <img src="week02/images/basic-logo.png" alt="Basic logo" width="128" height="128">
    </header>

    <nav>
        <ul>
            <li><a href="https://www.wikipedia.org">Wikipedia</a></li>
            <li><a href="https://www.bbc.com">BBC</a></li>
        </ul>
    </nav>

    <main>
        <h1>Basic HTML Structure</h1>

        <section>
            <h2>Heading One</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
        </section>

        <section>
            <h2>Heading Two</h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
        </section>
    </main>

    <aside>
        <img
          src="https://media.ldscdn.org/images/media-library/temples/ogden-utah/ogden-utah-temple-lds-1046677-gallery.jpg"
          alt="Temple image" width="200">
    </aside>

    <footer>
        <p>Usanga</p>
    </footer>

</body>

</html>
